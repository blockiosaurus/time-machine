<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="60%" stop-color="#0a0d18"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#f5d4a0"/>
      <stop offset="100%" stop-color="#a0764e"/>
    </linearGradient>
    <linearGradient id="hand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5d4a0"/>
      <stop offset="100%" stop-color="#a0764e"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="480" fill="url(#portal)"/>

  <g transform="translate(512 512)">
    <circle r="380" fill="none" stroke="url(#rim)" stroke-width="8" opacity="0.85"/>
    <circle r="350" fill="none" stroke="url(#rim)" stroke-width="2" opacity="0.45"/>
    <circle r="320" fill="none" stroke="url(#rim)" stroke-width="1" opacity="0.25"/>

    <g stroke="url(#rim)" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <line x1="0" y1="-360" x2="0" y2="-330"/>
      <line x1="180" y1="-311.77" x2="165" y2="-285.79"/>
      <line x1="311.77" y1="-180" x2="285.79" y2="-165"/>
      <line x1="360" y1="0" x2="330" y2="0"/>
      <line x1="311.77" y1="180" x2="285.79" y2="165"/>
      <line x1="180" y1="311.77" x2="165" y2="285.79"/>
      <line x1="0" y1="360" x2="0" y2="330"/>
      <line x1="-180" y1="311.77" x2="-165" y2="285.79"/>
      <line x1="-311.77" y1="180" x2="-285.79" y2="165"/>
      <line x1="-360" y1="0" x2="-330" y2="0"/>
      <line x1="-311.77" y1="-180" x2="-285.79" y2="-165"/>
      <line x1="-180" y1="-311.77" x2="-165" y2="-285.79"/>
    </g>

    <g font-family="Georgia, 'Times New Roman', serif" font-size="56" fill="url(#rim)" text-anchor="middle" opacity="0.92">
      <text x="0" y="-265">XII</text>
      <text x="265" y="20">III</text>
      <text x="0" y="285">VI</text>
      <text x="-265" y="20">IX</text>
    </g>

    <g stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-200" stroke="url(#hand)" stroke-width="10"/>
      <line x1="0" y1="0" x2="160" y2="80" stroke="url(#hand)" stroke-width="6"/>
    </g>
    <circle r="14" fill="#f5d4a0"/>
    <circle r="6" fill="#0a0d18"/>

    <g font-family="Georgia, 'Times New Roman', serif" fill="#f5d4a0" text-anchor="middle">
      <text y="-110" font-size="44" letter-spacing="8" opacity="0.92">TIME</text>
      <text y="155" font-size="44" letter-spacing="6" opacity="0.92">MACHINE</text>
    </g>
  </g>
</svg>
